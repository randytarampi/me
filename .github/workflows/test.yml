name: test

on:
  workflow_call:
    inputs:
      deployment_environment:
        description: 'The targeted `DEPLOYMENT_ENVIRONMENT`'
        required: false
        default: dev
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      CC_TEST_REPORTER_ID:
        required: true
      CODACY_PROJECT_TOKEN:
        required: true
      CODECOV_TOKEN:
        required: true
      COVERALLS_REPO_TOKEN:
        required: true
      REPORT_CI_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      deployment_environment:
        description: 'The targeted `DEPLOYMENT_ENVIRONMENT`'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prd

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run affected test suite
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24, 26]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      DEPLOY: false
      DEPLOYMENT_ENVIRONMENT: ${{ github.event.inputs.deployment_environment || inputs.deployment_environment }}
    runs-on:
      - ubuntu-latest
    concurrency: test-${{ github.ref }}-${{ matrix.node-version }}
    steps:
      - name: Set variables
        id: variables
        run: |
          echo "deployment_environment=$DEPLOYMENT_ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "NODE_ENV=$DEPLOYMENT_ENVIRONMENT" >> $GITHUB_ENV
          echo "PRINTABLE_PUPPETEER_NO_SANDBOX=$CI" >> $GITHUB_ENV
          echo "CPU_ARCH=$RUNNER_ARCH" >> $GITHUB_ENV
          echo "OS_NAME=$RUNNER_OS" >> $GITHUB_ENV
          echo "BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV
          echo "GIT_BRANCH=$GITHUB_REF_NAME" >> $GITHUB_ENV
          echo "COMMIT_SHA=$GITHUB_SHA" >> $GITHUB_ENV
          echo "GIT_COMMIT_SHA=$GITHUB_SHA" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$GITHUB_RUN_ID" >> $GITHUB_ENV
          echo "JOB_NUMBER=$GITHUB_RUN_ATTEMPT" >> $GITHUB_ENV
          if [[ $GITHUB_EVENT_NAME == 'pull_request' || $GITHUB_EVENT_NAME == 'pull_request_target' ]]; then
            echo "PULL_REQUEST=true" >> $GITHUB_ENV
          fi;

      - name: Run `git checkout`
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup node@${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - name: Enable Corepack
        run: corepack enable
      - name: Setup dependencies on build runner
        run: |
          sudo apt-get update
          sudo apt-get install language-pack-ja japan* fonts-wqy-microhei ttf-wqy-microhei

      # @NOTE-RT: Rerun `install` to make sure we've got our dependencies
      - name: Configure `yarn`
        run: |
          yarn config set script-shell $(which bash)
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx
          key: nx-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Actually run `yarn install --immutable --immutable-cache`
        run: yarn install --immutable --immutable-cache

      - name: Setup CodeClimate for tests
        run: |
          curl -L https://codeclimate.com/downloads/test-reporter/test-reporter-latest-linux-amd64 > $PWD/cc-test-reporter
          chmod +x $PWD/cc-test-reporter
          $PWD/cc-test-reporter before-build
        shell: bash
      - name: Setup DynamoDB Local
        uses: rrainn/dynamodb-action@v2.0.1
      - name: Actually run affected tests
        id: test-actual
        env:
          NODE_ENV: test
        run: |
          if [ "$(npx lerna ls --since HEAD...origin/master --json)" = "[]" ]; then
            yarn run pretest
            yarn cover:actual
          else
            npx lerna run pretest --since HEAD...origin/master
            npx lerna run cover --since HEAD...origin/master
          fi
        timeout-minutes: 10
      - name: Cleanup after tests
        if: always()
        env:
          NODE_ENV: test
        run: |
          yarn run kill --scope @randy.tarampi/service
      - name: Collect results
        if: always()
        env:
          NODE_ENV: test
        run: |
          yarn run pretest:collect
          yarn run cover:collect
      - name: Report results to CodeClimate
        if: always()
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}
        run: |
          $PWD/cc-test-reporter after-build --exit-code=$(if [[ "${{ steps.test-actual.outcome.success }}" == 'success' ]]; then echo '0'; else echo '1'; fi;) || true
        shell: bash
      - name: Report coverage to Coveralls
        if: always()
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Report coverage to CodeClimate
        if: always()
        uses: paambaati/codeclimate-action@v3.0.0
        with:
          coverageLocations: coverage/lcov.info:lcov
      - name: Report coverage to CodeCov
        if: always()
        uses: codecov/codecov-action@v2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
      - name: Report coverage to Codacy
        if: always()
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/lcov.info
      - name: Report coverage to report.ci
        if: always()
        env:
          REPORT_CI_TOKEN: ${{ secrets.REPORT_CI_TOKEN }}
        run: |
          python <(curl https://report.ci/upload.py) || true
        shell: bash
